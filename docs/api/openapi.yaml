openapi: 3.1.0
info:
  title: WBS Management Tool API
  version: 1.0.0
  description: 'WBS（Work Breakdown Structure）管理ツールのバックエンド REST API。


    プロジェクト > タスク > サブタスクの3階層で構成される WBS データの CRUD、

    ガントチャート表示用の集計、マスタ管理、ダッシュボード集計、Excel インポート/エクスポート、

    Azure DevOps 連携などを提供する。


    ## 共通仕様

    - 通信形式: JSON (REST)

    - ベースURL: `/api`

    - ステータス: マスタ `mst_status` に依存。デフォルトは `1`（新規）、`7`（Removed）は論理削除相当。

    - 日付項目: `YYYY-MM-DD` 形式。

    - 認証: 一般 API は認証なし（ローカル/イントラ前提、CORS は全許可）。Azure DevOps 同期 API のみ `X-Sync-Token` ヘッダによるトークン認証が必要。

    '
paths:
  /api/health:
    get:
      summary: ヘルスチェック
      operationId: read_health_api_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
      tags:
      - Health
      description: 'サーバの稼働確認。常に `{"status": "ok"}` を返す。'
  /api/wbs/version:
    get:
      summary: WBS バージョン取得
      operationId: read_wbs_version_api_wbs_version_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WBSVersionResponse'
      tags:
      - WBS
      description: WBSツリー（プロジェクト/タスク/サブタスク/中断期間）と初期データ（マスタ/マーカー/設定）の変更検知用バージョン文字列を返す。フロントは差分検知に使用する。
  /api/wbs:
    get:
      summary: WBS データ取得
      operationId: read_wbs_api_wbs_get
      parameters:
      - name: project_ids
        in: query
        required: false
        schema:
          type: array
          items:
            type: integer
          title: Project Ids
      - name: include_done
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: Include Done
      - name: include_removed
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: Include Removed
      - name: weeks
        in: query
        required: false
        schema:
          type: integer
          default: 8
          title: Weeks
      - name: refresh_ongoing_end_dates
        in: query
        required: false
        schema:
          type: boolean
          default: true
          title: Refresh Ongoing End Dates
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WBSResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      tags:
      - WBS
      description: 'プロジェクト > タスク > サブタスクの全階層データと、ガントチャート描画範囲を取得する。


        - `refresh_ongoing_end_dates=true` の場合、進捗100%かつ実績終了日未設定のサブタスクに当日をセットする。

        - 計画/実績工数合計・進捗率・重複フラグはレスポンス生成時に動的計算される。

        - `gantt_range` は全データの最小開始日〜最大終了日に前後バッファを加えて自動計算される。'
  /api/wbs/export:
    post:
      summary: WBS エクスポート
      operationId: export_wbs_api_wbs_export_post
      requestBody:
        content:
          application/json:
            schema:
              items:
                $ref: '#/components/schemas/ProjectWBS-Input'
              type: array
              title: Projects
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      tags:
      - WBS
      description: リクエストボディで渡した WBS（プロジェクト配列）を Excel ファイル（.xlsx）として出力する。
